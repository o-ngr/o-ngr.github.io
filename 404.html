<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 | Page Not Found</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0d0c0e;
    --bg-soft: #141215;
    --ink: #ece7e2;
    --ink-dim: #948d8a;
    --line: #2a2628;
    --accent: #7a1f2b;
    --accent-soft: #a8434f;
    --ring-size: clamp(300px, 62vw, 480px);
  }

  *{ box-sizing: border-box; margin: 0; padding: 0; }

  html, body{ height: 100%; }

  body{
    background: var(--bg);
    color: var(--ink);
    font-family: "Zen Old Mincho", "Noto Serif JP", "Hiragino Mincho ProN", serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    min-height: 100vh;
  }

  .stage{
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 48px 40px;
    max-width: 560px;
    width: 100%;
  }

  .eyebrow{
    font-family: "Inter", "Helvetica Neue", sans-serif;
    font-size: 11px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 28px;
  }

  /* --- signature element: a spell-card ring standing in for the boss
         that never spawned. two counter-rotating bullet rings framing
         the code, quiet enough to read as atmosphere first. --- */
  .hero{
    position: relative;
    display: inline-block;
  }

  .ring-field{
    position: absolute;
    top: 50%;
    left: 50%;
    width: var(--ring-size);
    height: var(--ring-size);
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: -1;
  }

  .ring-field .boundary{
    position: absolute;
    inset: 0;
    border-radius: 50%;
  }
  .ring-field .boundary--outer{
    border: 1px solid var(--line);
  }
  .ring-field .boundary--inner{
    inset: 13%;
    border: 1px dashed var(--line);
    opacity: 0.6;
  }

  .orbit{
    position: absolute;
    inset: 0;
    animation: spin linear infinite;
  }
  .orbit .bullet{
    position: absolute;
    top: 50%;
    left: 50%;
    width: 5px;
    height: 5px;
    margin: -2.5px;
    border-radius: 50%;
    background: var(--accent-soft);
    box-shadow: 0 0 5px 0 var(--accent);
  }
  .orbit .bullet.dim{
    background: var(--ink-dim);
    box-shadow: none;
    opacity: 0.55;
    width: 3px;
    height: 3px;
    margin: -1.5px;
  }

  @keyframes spin{
    from{ transform: rotate(0deg); }
    to{ transform: rotate(360deg); }
  }

  .code{
    position: relative;
    font-size: clamp(96px, 20vw, 168px);
    font-weight: 500;
    line-height: 1;
    letter-spacing: 0.02em;
    color: var(--ink);
    padding: 0 12px;
  }

  .code::after{
    content: "";
    display: block;
    width: 56px;
    height: 1px;
    background: var(--accent-soft);
    margin: 30px auto 0;
    opacity: 0.7;
  }

  .message{
    font-family: "Inter", "Helvetica Neue", sans-serif;
    font-size: 15px;
    line-height: 1.9;
    color: var(--ink-dim);
    letter-spacing: 0.02em;
    margin: 34px 0 46px;
  }

  .message strong{
    display: block;
    color: var(--ink);
    font-weight: 400;
    font-size: 16px;
    margin-bottom: 6px;
  }

  .actions{
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn{
    font-family: "Inter", "Helvetica Neue", sans-serif;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 15px 30px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    transition: border-color 0.35s ease, color 0.35s ease, background 0.35s ease;
    text-decoration: none;
    display: inline-block;
  }

  .btn:hover{
    border-color: var(--accent-soft);
    color: var(--accent-soft);
  }

  .btn.primary{
    background: var(--accent);
    border-color: var(--accent);
    color: var(--ink);
  }

  .btn.primary:hover{
    background: var(--accent-soft);
    border-color: var(--accent-soft);
    color: var(--bg);
  }

  .btn:focus-visible{
    outline: 1px solid var(--accent-soft);
    outline-offset: 3px;
  }

  /* counter badge, tucked out of the way instead of sitting on the hero */
  .counter-badge{
    position: fixed;
    right: 16px;
    bottom: 14px;
    z-index: 2;
    opacity: 0.45;
    transition: opacity 0.3s ease;
    line-height: 0;
  }
  .counter-badge:hover{ opacity: 0.85; }
  .counter-badge img{
    display: block;
    width: 140px;
    height: auto;
  }

  @media (max-width: 480px){
    .stage{ padding: 32px 24px; }
    .actions{ flex-direction: column; align-items: stretch; }
    .btn{ padding: 16px 24px; }
    .counter-badge{ right: 10px; bottom: 10px; }
    .counter-badge img{ width: 110px; }
  }

  @media (prefers-reduced-motion: reduce){
    .orbit{ animation: none; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="eyebrow">Onogoro</div>

  <div class="hero">
    <div class="ring-field" id="ringField" aria-hidden="true">
      <div class="boundary boundary--outer"></div>
      <div class="boundary boundary--inner"></div>
    </div>
    <div class="code">404</div>
  </div>

  <p class="message">
    <strong>The requested URL was not found on this server.</strong>
    That's all we know.
  </p>

  <div class="actions">
    <button class="btn" id="backBtn" type="button">前のページへ戻る</button>
    <a class="btn primary" href="/ms05/" id="homeBtn">トップページへ</a>
  </div>
</div>

<a class="counter-badge" href="/ms05/" aria-label="アクセスカウンター">
  <img src="https://counter.256server.com/@:ms05" alt="アクセスカウンター" width="140" height="42">
</a>

<script>
  // spell-card ring: two counter-rotating bullet formations framing the code,
  // built the same way a ring pattern gets laid out in the STG projects —
  // even spacing around a radius, opposite spin directions.
  (function(){
    var field = document.getElementById('ringField');

    function buildRing(count, radiusPct, duration, reverse, dim){
      var orbit = document.createElement('div');
      orbit.className = 'orbit';
      orbit.style.animationDuration = duration + 's';
      orbit.style.animationDirection = reverse ? 'reverse' : 'normal';

      for(var i = 0; i < count; i++){
        var bullet = document.createElement('span');
        bullet.className = 'bullet' + (dim ? ' dim' : '');
        var angle = (360 / count) * i;
        bullet.style.transform =
          'rotate(' + angle + 'deg) translateY(calc(var(--ring-size) * -' + radiusPct + '))';
        orbit.appendChild(bullet);
      }
      field.appendChild(orbit);
    }

    buildRing(10, 0.50, 52, false, false); // outer ring, slow clockwise
    buildRing(7,  0.37, 34, true,  true);  // inner ring, faster counter-clockwise, dimmer
  })();

  document.getElementById('backBtn').addEventListener('click', function(){
    if(window.history.length > 1){
      window.history.back();
    } else {
      window.location.href = '/';
    }
  });
</script>

</body>
</html>
