<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カウンター</title>
<style>
  body {
    font-family: sans-serif;
    background: #f5f5f5;
  }

  /* カウンタ全体の枠組み */
  .my-counter-wrapper {
    text-align: center;
    margin: 20px auto;
  }
  /* ラベル文字（WELCOME! YOU ARE / VISITOR!） */
  .counter-label {
    display: block;
    font-size: 14px;
    color: #333;
    margin: 5px 0;
    font-weight: bold;
  }
  /* 数字画像が並ぶエリア */
  .counter-images-area {
    display: flex; /* 画像を横並びにする */
    justify-content: center; /* 中央に寄せる */
    align-items: center;
    margin: 10px 0;
  }
  /* 数字画像1枚ずつのスタイル */
  .counter-digit-img {
    display: block;
    height: 32px; /* 画像の高さを好きなサイズに固定する */
    width: auto; /* 横幅は自動調整（画像の縦横比を保つ） */
    margin: 0 -1px; /* 画像同士の隙間をなくす（必要に応じて調整） */
    border: none;
  }
</style>
</head>
<body>

<div class="my-counter-wrapper">
  <span class="counter-label">WELCOME! YOU ARE</span>
  <div id="custom-counter" class="counter-images-area">
    Loading...
  </div>
  <span class="counter-label">VISITOR!</span>
</div>
  
<script>
  document.addEventListener("DOMContentLoaded", function() {
    // 💡 「あなたのユーザー名〜」の部分を半角英数字に変更しています
    const siteKey = "my_site_counter_v2"; 
    const counterUrl = `https://api.hana-counter.net/v1/counter/${siteKey}/hit`;
    
    // 💡 前回の「おすすめの解決策」通り、先頭の「/couter/」を削った相対パスにしています
    const imagePath = "counter_images/"; 

    const counterContainer = document.getElementById("custom-counter");

    fetch(counterUrl)
      .then(response => {
        if (!response.ok) {
          throw new Error(`APIエラー (Status: ${response.status})`);
        }
        return response.json();
      })
      .then(data => {
        const count = data.count;
        const paddedCount = String(count).padStart(6, '0');
        counterContainer.innerHTML = "";

        for (let num of paddedCount) {
          const img = document.createElement("img");
          img.src = `${imagePath}${num}.png`;
          img.alt = num;
          img.className = "counter-digit-img";
          
          // 画像が読み込めなかったときの保険（文字で数字を表示）
          img.onerror = function() {
            this.style.display = 'none';
            const span = document.createElement("span");
            span.innerText = num;
            span.style.fontSize = "24px";
            span.style.margin = "0 2px";
            counterContainer.appendChild(span);
            console.error(`画像の読み込みに失敗しました: ${this.src}`);
          };

          counterContainer.appendChild(img);
        }
      })
      .catch(error => {
        console.error("Counter Error:", error);
        counterContainer.innerText = `エラー発生: ${error.message}`;
      });
  });
</script>
</body>
</html>
